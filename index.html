<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GLPI SIGPEC</title>
    <!-- Link para o CSS (que será único) -->
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* Pequenos ajustes específicos para a página de login */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F5F7FB;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 61px 281px 117px 267px;
            gap: 46px;
            width: 1280px;
            height: 720px;
            background: #F5F7FB;
            box-sizing: border-box;
        }
        .logo-gestao {
            width: 200px;
            height: 81px;
            background: url('../assets/logo.png') no-repeat center / contain;
            flex: none;
            order: 0;
            flex-grow: 0;
        }
        .quadro-branco {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 15px 201px;
            gap: 15px;
            width: 732px;
            height: 358px;
            background: #FFFFFF;
            flex: none;
            order: 1;
            flex-grow: 0;
            box-sizing: border-box;
        }
        .login-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            gap: 22px;
            width: 330px;
            height: 55px;
            background: #FFFFFF;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }
        .login-title {
            width: 330px;
            height: 21px;
            font-weight: 600;
            font-size: 17px;
            line-height: 21px;
            text-align: center;
            color: #000000;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }
        .line-separator {
            width: 345px;
            height: 0px;
            border: 1px solid #D9DBDE;
            flex: none;
            order: 1;
            flex-grow: 0;
        }
        .campo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 330px;
            flex: none;
            align-self: stretch;
        }
        .campo-wrapper .rotulo {
            font-weight: 400;
            font-size: 12px;
            line-height: 15px;
            color: #000000;
        }
        .campo-wrapper .rotulo-senha {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .campo-wrapper .rotulo-senha .esqueceu {
            font-size: 11px;
            color: #3B73A7;
            cursor: pointer;
        }
        .campo-input {
            box-sizing: border-box;
            width: 100%;
            height: 35px;
            background: #FFFFFF;
            border: 1px solid #D9DBDE;
            border-radius: 2px;
            padding: 0 8px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
        }
        .check-lembre {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 4px;
            width: 330px;
            height: 24px;
            background: #FFFFFF;
            flex: none;
            order: 5;
            align-self: stretch;
            flex-grow: 0;
        }
        .check-lembre input[type="checkbox"] {
            width: 24px;
            height: 24px;
            flex: none;
            order: 0;
            flex-grow: 0;
            accent-color: #1C1B1F;
        }
        .check-lembre label {
            font-size: 12px;
            line-height: 15px;
            color: #000000;
            flex: none;
            order: 1;
            flex-grow: 0;
        }
        .bt-iniciar {
            width: 330px;
            height: 44px;
            background: #CCEAFD;
            border-radius: 3px;
            flex: none;
            order: 6;
            align-self: stretch;
            flex-grow: 0;
            border: none;
            font-size: 15px;
            line-height: 18px;
            color: #000000;
            cursor: pointer;
            transition: background 0.2s;
        }
        .bt-iniciar:hover {
            background: #b0d4e8;
        }
        .footer-copy {
            width: 284px;
            height: 12px;
            font-size: 11px;
            line-height: 13px;
            color: #3B73A7;
            flex: none;
            order: 2;
            flex-grow: 0;
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Logo -->
    <div class="logo-gestao"></div>

    <!-- Quadro branco -->
    <div class="quadro-branco">
        <div class="login-inner">
            <div class="login-title">Login na sua Conta</div>
            <div class="line-separator"></div>
        </div>

        <!-- Campo Nome de utilizador -->
        <div class="campo-wrapper">
            <span class="rotulo">Nome de utilizador</span>
            <input class="campo-input" type="text" id="username" placeholder="Digite seu usuário" />
        </div>

        <!-- Campo Palavra-passe -->
        <div class="campo-wrapper">
            <div class="rotulo rotulo-senha">
                <span>Palavra-passe</span>
                <span class="esqueceu">Esqueceu-se da palavra-passe?</span>
            </div>
            <input class="campo-input" type="password" id="password" placeholder="Digite sua senha" />
        </div>

        <!-- Checkbox Lembre-me -->
        <div class="check-lembre">
            <input type="checkbox" id="remember" />
            <label for="remember">Lembre-me</label>
        </div>

        <!-- Botão -->
        <button class="bt-iniciar" id="btnLogin">Iniciar sessão</button>
    </div>

    <div class="footer-copy">GLPI Cpyright (C) 2015-2023 Teclib’ and contributors</div>
</div>

<script>
    document.getElementById('btnLogin').addEventListener('click', function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        // Credenciais definidas
        const isUsuario = (username === 'd123456' && password === 'brasil2026');
        const isTecnico = (username === 'd225566' && password === 'sigpec00');

        if (isUsuario) {
            window.location.href = 'usuario/dashboard.html';
        } else if (isTecnico) {
            window.location.href = 'tecnico/dashboard.html';
        } else {
            alert('Usuário ou senha inválidos!');
        }
    });
</script>

</body>
</html>
